[Application]
Prefix =GKS

[Drives]
// Drive0 is 'D:\' by default. Drive# =Logical Drive name #=1..10
Drive1=E:\
Drive2=F:\
Drive3=j:\


[Impostazioni]
//Inserimento numero di programmi che il sistema pụ servire
NumeroProgrammi=2
// Percorso per caricare le bitmap 
PathBmp=c:\Aggiorna\Bmp\
//Identificativo comune Nome Computer (Es: Grafikscan3000=GKS30)
IdComputer=GKS30


// Percorso per lingua locale
PathLingua=Applicazione\Lingua\
// Percorso per back-up dati
PathDati=Applicazione\Console\Dati\
// Percorso per back-up dati
PathBackUp=Temp\
// Percorso per file versioni
PathVersioni=Applicazione\Versioni\
// Percorso file eseguibile sulla console
PathEseguibile=Applicazione\Console\Eseguibile\
// Percorso per eventuali DLL da installare [OPZIONALE]
PathDll=Applicazione\Dll\


[DatiProgramma1]
// Percorso per lingua locale
PathProgramma1=c:\Grafikscan3000\
// Nome file eseguibile  console
Programma1='Grafikscan3000'
// CODICE  versione programma
CodiceRevisionePrg1='G30P'
NomeFileEsito1='C:\\Grafikscan3000.rev'


[DatiProgramma2]
// Percorso per lingua locale
PathProgramma2=c:\Grafikscan2100\
// Nome file eseguibile  console
Programma2='Grafikscan2100'
// CODICE  versione programma
CodiceRevisionePrg2='G21P'
// CODICE  versione programma
NomeFileEsito2='C:\\Grafikscan2100.rev'


[Messaggi]
// Stringa per terminare perche' questo file non esiste o e' errato
FileErrato=Touch This Windows for Close the program!
// Stringa per avvisare che la cartella dell'applicazione non esiste!
ErroreCartellaApplicazione=The application Folder don't exist!
// Stringa per avvisare che l'applicazione non esiste!
ErroreApplicazione=The Executable File don't exist!
// Stringa per avvisare che il processo dell'applicazione non e' avviato
ErroreProcesso=Impossible start the Application!
// Stringa per avvisare che l-aggiornamento e' terminato
AggiornamentoTerminato=Upgrade OK! Remove the disk and restart 
[Sistema]
// 0=disabilita auto spegnimento - 1=Abilita auto spegnimento
AutoSpegnimento=1
